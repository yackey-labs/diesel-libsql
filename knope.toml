[package]
versioned_files = ["Cargo.toml"]
changelog = "CHANGELOG.md"

[github]
owner = "yackey-labs"
repo = "diesel-libsql"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "cargo generate-lockfile"

[[workflows.steps]]
type = "Command"
command = "git add -A && git commit -m 'chore: prepare release $version'"
shell = true

[[workflows.steps]]
type = "Command"
command = "cargo publish"

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"
